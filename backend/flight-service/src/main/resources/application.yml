server:
  port: 8084
spring:
  application:
    name: flight-service
  datasource:
    url: jdbc:mysql://localhost:3306/flight_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
passenger:
  service:
    url: ${PASSENGER_SERVICE_URL:http://localhost:8083}
notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
aviationstack:
  api:
    key: ${AVIATIONSTACK_API_KEY:c10d8157e19b8c398706bbc004f4ec2a}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
