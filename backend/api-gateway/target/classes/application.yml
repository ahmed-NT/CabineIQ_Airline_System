server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: aircraft-service
          uri: lb://aircraft-service
          predicates:
            - Path=/api/aircraft/**
        - id: seat-service
          uri: lb://seat-service
          predicates:
            - Path=/api/seats/**
        - id: passenger-service
          uri: lb://passenger-service
          predicates:
            - Path=/api/passengers/**
        - id: flight-service
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

